<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Bank | Admin Account Unlock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4"><i class="fas fa-unlock text-success me-2"></i>Admin Account Management</h1>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="unlock-card">
                    <h5>Unlock Locked Accounts</h5>
                    <form id="unlock-form">
                        <div class="mb-3">
                            <label for="account-no" class="form-label">Account Number</label>
                            <input type="text" class="form-control" id="account-no" required>
                        </div>
                        <div class="mb-3">
                            <label for="admin-password" class="form-label">Admin Password</label>
                            <input type="password" class="form-control" id="admin-password" required>
                        </div>
                        <button type="submit" class="btn btn-success">Unlock Account</button>
                    </form>
                </div>

                <div class="unlock-card">
                    <h5>Account Status Check</h5>
                    <form id="status-form">
                        <div class="mb-3">
                            <label for="check-account" class="form-label">Account Number</label>
                            <input type="text" class="form-control" id="check-account" required>
                        </div>
                        <button type="submit" class="btn btn-info">Check Status</button>
                    </form>
                    <div id="status-result" class="mt-3"></div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="suspicious-alert.html" class="btn btn-outline-warning">View Alerts</a>
            <a href="indexlogin.html" class="btn btn-outline-light ms-2">Back to Home</a>
            <button class="btn btn-outline-danger ms-2" onclick="clearAllData()">Clear All Data</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="account-lock.js"></script>
    <script src="suspicious.js"></script>
    <script src="main.js"></script>
</body>
</html>
