<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Bank | Secure Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <a href="#" class="neo-logo">NEO BANK</a>
        <div class="tagline">Secure Digital Access</div>

        <form>
            <div class="form-group">
                <i class="fas fa-user-shield input-icon"></i>
                <input type="text" id="login-username" class="form-control" placeholder="Username (from registration)" required>
            </div>

            <div class="form-group">
                <i class="fas fa-key input-icon"></i>
                <input type="password" id="pwd" class="form-control" placeholder="Password" required>
            </div>

            <div class="form-group device-id-group" id="deviceIdGroup">
                <i class="fas fa-microchip input-icon"></i>
                <input type="text" class="form-control" id="deviceIdInput" placeholder="Device Bound ID (from registration)">
                <small class="text-info">Enter the Device Bound ID shown during registration</small>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mb-4 px-1">
                <div class="form-check small">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label text-muted" for="remember">Remember Device</label>
                </div>
                <a href="#" class="small text-info text-decoration-none">Forgot ID?</a>
            </div>

            <button type="submit" class="btn btn-login">AUTHORIZE LOGIN</button>
        </form>

        <p class="security-hint">
            <i class="fas fa-info-circle me-1"></i> 
            Always check for the "https://" lock icon in your browser address bar.
        </p>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="account-lock.js"></script>
<script src="main.js"></script>

</body>
</html>
